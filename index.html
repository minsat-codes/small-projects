<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <title>Fawzia | Cyberpunk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Matrix Canvas Background -->
    <canvas id="matrix"></canvas>

    <!-- Floating Stickers Behind Card -->
    <div class="stickers">
        <span>💻</span>
        <span>🎮</span>
        <span>⚡</span>
        <span>👾</span>
        <span>🕹️</span>
    </div>

    <!-- Glass Cyberpunk Card -->
    <div class="profile-card">

        <!-- Profile Image -->
        <div class="img-container">
            <img src="image.jpg" alt="Profile">
            <div class="neon-halo"></div>
        </div>

        <!-- Typing Effect Name -->
        <h1 class="typing"></h1>

        <!-- Bio -->
        <p>Web Dev | Gamer | Cyber Queen ⚡</p>

        <!-- Clickable Links -->
        <div class="links">
            <a href="#">🎮 Gaming</a>
            <a href="#">💻 GitHub</a>
            <a href="#">📸 Instagram</a>
            <a href="#">🌐 Portfolio</a>
        </div>

    </div>

    <!-- Background Music (optional) -->
    <audio autoplay loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
